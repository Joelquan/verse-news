  <text x="56" y="560" fill="#fff" font-family="Georgia, serif" font-size="34" font-weight="700">Prophet Confronts Jeroboam at His</text><text x="56" y="600" fill="#fff" font-family="Georgia, serif" font-size="34" font-weight="700">Altar — Then Is Deceived by Another</text>
