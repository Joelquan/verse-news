  <text x="56" y="560" fill="#fff" font-family="Georgia, serif" font-size="34" font-weight="700">Gideon Pursues the Last Two</text><text x="56" y="600" fill="#fff" font-family="Georgia, serif" font-size="34" font-weight="700">Midianite Kings — Refuses Help,</text>
