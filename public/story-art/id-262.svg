<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Mother-in-Law Urges Both Daughters to Go Home — One Does, One Refuses">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="hsl(31, 25%, 38%)"/>
      <stop offset="100%" stop-color="hsl(51, 20%, 20%)"/>
    </linearGradient>
    <linearGradient id="shade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0.05"/>
      <stop offset="50%" stop-color="#000" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.78"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1000" cy="120" r="180" fill="hsl(38, 70%, 52%)" opacity="0.15"/>
  <rect x="400" y="200" width="400" height="280" rx="10" fill="hsl(30, 40%, 90%)" opacity=".2"/><path d="M460 280 H740 M460 360 H700" stroke="hsl(30, 40%, 90%)" stroke-width="8" opacity=".45"/>
