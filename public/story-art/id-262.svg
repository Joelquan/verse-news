  <text x="56" y="82" fill="rgba(255,255,255,.75)" font-family="Arial,sans-serif" font-size="15" letter-spacing="1">Ruth 1:6-18</text>
  <text x="56" y="560" fill="#fff" font-family="Georgia, serif" font-size="34" font-weight="700">Mother-in-Law Urges Both Daughters</text><text x="56" y="600" fill="#fff" font-family="Georgia, serif" font-size="34" font-weight="700">to Go Home — One Does, One Refuses</text>
</svg>