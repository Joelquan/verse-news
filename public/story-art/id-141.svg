      <stop offset="0%" stop-color="hsl(152, 40%, 45%)"/>
      <stop offset="100%" stop-color="hsl(172, 30%, 27%)"/>
    </linearGradient>
    <linearGradient id="shade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0.05"/>
