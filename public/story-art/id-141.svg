  <text x="56" y="52" fill="hsl(148, 70%, 52%)" font-family="Arial,sans-serif" font-size="16" font-weight="800" letter-spacing="3">VERSE NEWS · REPORT</text>
  <text x="56" y="82" fill="rgba(255,255,255,.75)" font-family="Arial,sans-serif" font-size="15" letter-spacing="1">Numbers 7:1–89</text>
  <text x="56" y="560" fill="#fff" font-family="Georgia, serif" font-size="34" font-weight="700">Twelve Tribal Leaders Bring</text><text x="56" y="600" fill="#fff" font-family="Georgia, serif" font-size="34" font-weight="700">Identical Gifts Over Twelve</text>
